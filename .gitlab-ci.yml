include:
  - project: 'ci-cd/semantic-release'
    ref: main
    file: 'semantic-release.yml'

  - project: 'ci-cd/composer-configuration'
    ref: main
    file: 'package.yml'

  - project: 'ci-cd/magento-module'
    ref: master
    file: 'codeception-ci.yml'

  - project: 'ci-cd/magento-module'
    ref: master
    file: 'codequality-ci.yml'

  - project: 'ci-cd/github-release'
    ref: main
    file: 'github-release.yml'

variables:
  MAGENTO_PHP_VERSION: '8.1'

magento-module/test/functional:
  variables:
    MIN_PHP_VERSION: '8.1'
  before_script:
    - !reference [magento-module/test/functional, before_script]
    - $COMPOSER_COMMAND config allow-plugins.magento/composer-dependency-version-audit-plugin false
    - $COMPOSER_COMMAND config allow-plugins.magento/magento-composer-installer true
    - $COMPOSER_COMMAND config allow-plugins.magento/inventory-composer-installer true
    - $COMPOSER_COMMAND config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

release:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
