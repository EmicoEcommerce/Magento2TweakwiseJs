include:
  - project: 'ci-cd/semantic-release'
    ref: main
    file: 'semantic-release.yml'

  - project: 'ci-cd/composer-configuration'
    ref: main
    file: 'package.yml'

  - project: 'ci-cd/magento-module'
    ref: master
    file: 'codeception-ci.yml'

  - project: 'ci-cd/magento-module'
    ref: master
    file: 'codequality-ci.yml'

variables:
  MAGENTO_PHP_VERSION: '8.1'

magento-module/test/functional:
  variables:
    MIN_PHP_VERSION: '8.1'

release:
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never

github-release:
  image: alpine:latest
  stage: release
  variables:
    GIT_STRATEGY: none
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      if [ -z "${GITHUB_TOKEN:-}" ]; then
        echo "GITHUB_TOKEN is required to create the GitHub release."
        exit 1
      fi

      if [ -z "${GITHUB_REPOSITORY:-}" ]; then
        echo "GITHUB_REPOSITORY is required, for example: EmicoEcommerce/Magento2TweakwiseJs."
        exit 1
      fi

      release_url="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}"
      gitlab_release="$(curl --fail --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${release_url}")"

      tag_name="$(echo "${gitlab_release}" | jq -r '.tag_name')"
      release_name="$(echo "${gitlab_release}" | jq -r '.name // .tag_name')"
      release_description="$(echo "${gitlab_release}" | jq -r '.description // ""')"

      echo "Creating GitHub release ${tag_name} in ${GITHUB_REPOSITORY}."

      payload="$(
        jq -n \
          --arg tag_name "${tag_name}" \
          --arg target_commitish "${CI_COMMIT_SHA}" \
          --arg name "${release_name}" \
          --arg body "${release_description}" \
          '{
            tag_name: $tag_name,
            target_commitish: $target_commitish,
            name: $name,
            body: $body,
            draft: true,
            prerelease: true
          }'
      )"

      github_api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases"
      curl --fail --silent --show-error --request POST \
        --header "Accept: application/vnd.github+json" \
        --header "Authorization: Bearer ${GITHUB_TOKEN}" \
        --data "${payload}" \
        "${github_api}"
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - when: never
